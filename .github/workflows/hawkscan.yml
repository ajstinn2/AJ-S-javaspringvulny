name:  HawkScan
on:
  push: 
    branches:
      - main
  pull_request:
jobs:
  hawkscan:
    name: HawkScan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Create ${{ github.event.client_payload.AJ-S-javaspringvulny }} app directory
        run: mkdir -p common/build/integrationTests/hawkscan-action/apps/${{ github.event.client_payload.AJ-S-javaspringvulny }}
      - name: Navigate to ${{ github.event.client_payload.AJ-S-javaspringvulny }} app directory
        run: cd common/build/integrationTests/hawkscan-action/apps/${{ github.event.client_payload.AJ-S-javaspringvulny }}
      - name: Checkout vulny repo
        run: git clone https://github.com/${{ github.event.client_payload.ajstinn2 }}/${{ github.event.client_payload.AJ-S-javaspringvulny }}.git
      - name: Run ${{ github.event.client_payload.AJ-S-javaspringvulny }}
        run: docker-compose up -d
      - name: Navigate to repo root directory
        run: cd /home/runner/work/${{ github.event.client_payload.AJ-S-javaspringvulny }}/${{ github.event.client_payload.AJ-S-javaspringvulny }}
      - name: Run HawkScan
        id: run-hawkscan
        uses: stackhawk/hawkscan-action@main
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}
          configurationFiles: ${{ github.event.client_payload.configFile }}
          sourceURL: ${{ github.event.client_payload.hawkscanSourceUrl }}
          version: ${{ github.event.client_payload.hawkscanVersion }}
          verbose: ${{ github.event.client_payload.verbose }}
        env:
          # APPLICATION_ID: ${{ github.event.client_payload.appId }}
          APP_ID: ${{ github.event.client_payload.appId }}
